# CRE Secrets Configuration
# These map environment variable names to the secret names CRE uses at runtime.
# Set the corresponding env vars in your .env file.
# NEVER commit actual secret values here.

# secrets.yaml  (project root: private-prediction-market/)
# Maps secret IDs used in workflow code to environment variable names.
# In simulation: values are read from your .env file.
# In production: values are pushed to the Vault DON via `cre secrets push`.

secretsNames:
  GEMINI_API_KEY:
    - GEMINI_API_KEY
